services:
  backend:
    build:
      context: ./backend
    container_name: aulabot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    container_name: aulabot-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

